<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="autor" content="Erin McCarty" />
    <link rel="stylesheet" href="./pages/index.css" />
    <title>Around The U.S</title>
  </head>
  <body class="page">
    <div class="page__content"></div>
      <header class="header">
        <img
          class="header__logo"
          src="./images/logo.svg"
          alt="around-the-us-logo" />
      </header>
      <main class="content">
        <section class="profile">
          <img
            class="profile__image"
            src="./images/jacques-cousteau.jpg"
            alt="Avatar" />
          <div class="profile__info">
              <h1 class="profile__title">Jacques cousteau</h1>
              <button class="profile__edit-button"  type="button" aria-label="Edit Profile">
                </button>
                <p class="profile__description">Explorer</p>
            </div>
          <button class="profile__add-button" type="button">
          </button>
        </section>
        <section class="cards">
          <ul class="cards__list">
            <li class="cards__card">
              <img
                class="cards__image"
                src="./images/yosemite-valley.jpg"
                alt="photo-of-lake-yosemite-valley"/>
            <div class="cards__footer">
              <h2 class="cards__title">Yosemite Valley</h2>
              <button class="cards__like-button" type="button"></button>
            </div>
          </li>
          <li class="cards__card">
            <img
              class="cards__image"
              src="./images/lake-louise.jpg"
              alt="photo-of-lake-louise"/>
            <div class="cards__footer">
              <h2 class="cards__title">Lake Louise</h2>
              <button class="cards__like-button" type="button"></button>
            </div>
          </li>
          <li class="cards__card">
            <img
              class="cards__image"
              src="./images/bald-mountains.jpg"
              alt="photo-of-bald-mountains"/>
            <div class="cards__footer">
              <h2 class="cards__title">Bald Mountains</h2>
              <button class="cards__like-button" type="button">
              </button>
              </div>
            </li>
          <li class="cards__card">
            <img
              class="cards__image"
              src="./images/latemar.jpg"
              alt="photo-of-latenar"/>
            <div class="cards__footer">
              <h2 class="cards__title">Latemar</h2>
              <button class="cards__like-button" type="button">
              </button>
              </div>
            </li>
          <li class="cards__card">
            <img
              class="cards__image"
              src="./images/vanoise-national-park.jpg"
              alt="photo-of-vanoise-national-park"/>
            <div class="cards__footer">
              <h2 class="cards__title">Vanoise National Park</h2>
              <button class="cards__like-button" type="button">
              </button>
            </div>
          </li>
          <li class="cards__card">
            <img
              class="cards__image"
              src="./images/lago-di-braies.jpg"
              alt="photo-of-lago-di-braies"/>
            <div class="cards__footer">
              <h2 class="cards__title">Lago Di Braies</h2>
              <button class="cards__like-button" type="button">
              </button>
              </div>
            </li>
          </ul>
        </section>
          </main>
      <footer class="footer">
      <p class="footer__title">© 2022 Around The U.S.</p>
      </footer>
      </body>
      </html>
